project_name: jelly-bean-world-ppo-deviation
output_dir: artifacts/continual_swimmer_jax/jelly_bean_world_ppo_deviation

algorithm:
  name: ppo
  uses_deviation_correction: true

benchmark:
  name: jelly_bean_world
  total_steps: 20000000
  seeds: [0, 1, 2, 3, 4]
  checkpoint_interval: 250000
  evaluation_interval: 500000
  env_kwargs:
    map_size: 32
    curriculum: true
    population_count: 1

ppo:
  num_envs: 4096
  rollout_length: 64
  num_minibatches: 32
  update_epochs: 2
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  value_coef: 0.5
  entropy_coef: 0.01
  actor_lr: 0.0003
  critic_lr: 0.0003
  max_grad_norm: 0.5

correction:
  enabled: true
  penalty_weight: 0.25
  margin: 0.0
  max_lookback: 8
  include_best_so_far: true
  predicted_future_steps: 1
  positive_regret_power: 1.0
  kl_floor: 0.00000001

representation:
  metrics:
    - linear_cka
    - cosine_drift
    - ridge_probe_r2
  probe_targets:
    - bean_density
    - heading
    - policy_entropy
    - return_to_go
  compare_windows:
    - early
    - peak
    - post_collapse
  ridge_alpha: 0.0001

variation_budget:
  enabled: true
  anchor_observation_count: 4096
  reduction: max
  include_policy_budget: true
  include_reward_budget: true
  include_kernel_budget: false
  policy_metric: categorical_tv
  accumulate: true

runtime:
  platform: gpu
  require_gpu: true
  dtype: bfloat16
  enable_x64: false
  xla_flags:
    - --xla_gpu_triton_gemm_any=true
  preallocate: false
  jax_debug_nans: false
