# compaction_rgmix: production RL run with KV compaction on rg-mix.
#
# 3-node 2-1 split (see experiments/compaction_rgmix/launch.sh):
#   Node 0: vLLM inference server DP=4, compaction window=4096 stride=512
#   Node 1: vLLM inference server DP=4, compaction window=4096 stride=512
#   Node 2: FSDP2 trainer DP=4
#
# Compaction settings must mirror inference.toml exactly. The RL config's
# cross-validator only runs when inference is co-configured; in this split
# inference is launched from a separate TOML so sync is manual.

max_steps = 500
seq_len = 16384
output_dir = "outputs/compaction_rgmix"
clean_output_dir = true

# Shared checkpoint block — auto-propagates to trainer.ckpt and
# orchestrator.ckpt. Saves every 50 steps under output_dir.
[ckpt]
interval = 50

# 4-GPU trainer node. Inference runs on two remote nodes via
# orchestrator.client.base_url. num_infer_gpus=0 because the RL launcher's
# embedded inference subprocess is not used.
[deployment]
type = "single_node"
gpus_per_node = 4
num_train_gpus = 4
num_infer_gpus = 0

[model]
name = "Qwen/Qwen3-4B-Instruct-2507"

[wandb]
project = "kv-eviction"
name = "compaction-rgmix"

# Full FT — impl=hf and flash_attention_2 are required for the segmented
# forward path (the TrainerConfig validator enforces this when
# compaction.window_size > 0).
[trainer.model]
name = "Qwen/Qwen3-4B-Instruct-2507"
impl = "hf"
attn = "flash_attention_2"

# NOTE: per-block activation checkpointing (`[trainer.model.ac]`) is
# DISABLED for compaction training. Prime-rl's per-block checkpoint_wrapper
# re-runs each decoder layer's forward during backward under non-reentrant
# mode. When the forward has use_cache=True with a DynamicCache (required
# for past_key_values to flow between segments), each layer's re-run
# appends K/V to the same cache object again, doubling the cache length
# and producing a CheckpointError. See smoke4 rl_smoke4.toml for the full
# reproduction. Smoke #4 v6 peaked at 45.9 GiB without AC on 4xA100-80GB
# at batch_size=64 — batch_size=128 here may push higher; budget is ~80GB.

[trainer.compaction]
window_size = 4096
stride = 512
block_size = 16
bptt_segments = 1

[trainer.loss]
kl_tau = 0.0

[trainer.optim]
lr = 2e-6
weight_decay = 0.01
betas1 = 0.9
betas2 = 0.9
max_norm = 1.0

[orchestrator]
batch_size = 128
rollouts_per_example = 8
oversampling_factor = 1.0

[orchestrator.client]
base_url = [
  "http://__INFERENCE_NODE_0__:8000/v1",
  "http://__INFERENCE_NODE_1__:8000/v1",
]

[orchestrator.train.sampling]
max_completion_tokens = 15000
temperature = 1.0

[[orchestrator.train.env]]
id = "rg-mix-env"
args = { num_train_examples = 7500, num_eval_examples = 100, seed = 42, dataset_path = "/pscratch/sd/s/siddart2/datasets/rg_mix_7500" }

# NO [orchestrator.eval] section — no eval before train, no eval between
# training steps. Reward / mismatch KL / entropy / seq_len are logged
# every step from the training rollouts alone.
