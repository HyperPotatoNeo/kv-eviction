# textworld-eviction-summary: Markovian Summary (mode="eviction") on
# TextWorld cooking — EAI single-node, seed 1.
#
# Append-only summarization layered on top of vLLM-side block KV eviction.
# When compaction_max_turns is hit client-side, the orchestrator synthesizes
# a summary and inserts {user:instruction, assistant:summary} into the
# message list WITHOUT truncating the prior body. vLLM's scheduler handles
# the actual KV compression. The summary is a first-class trainable turn.
#
# Post-trigger client-visible shape: sys + body + [I, S] + tail.
# The trainer sees whatever tokens vLLM actually processed post-eviction
# (via the admission-trim `prompt_token_ids` stash).
#
# See `plans/markovian_summary.md` for full design.

max_steps = 600
seq_len = 16384
output_dir = "/mnt/adea/data_rw/finetuning/emilianopp/experiments/rebuttal/eviction-summary-textworld-seed1-v3"
clean_output_dir = false

[ckpt]
interval = 50
resume_step = -1

[deployment]
type = "single_node"
gpus_per_node = 8
num_train_gpus = 4
num_infer_gpus = 4

[model]
name = "Qwen/Qwen3-4B-Instruct-2507"

[wandb]
project = "textworld-eviction"
name = "eviction-summary-textworld-seed1-v3"
id = "eviction-summary-textworld-seed1-v3"
group = "eviction-summary-textworld"

[trainer.model]
name = "Qwen/Qwen3-4B-Instruct-2507"
impl = "hf"
attn = "flash_attention_2"

# Eviction mode: vLLM-side block compaction is ON, so trainer must
# use segmented_forward with matching compaction parameters.
[trainer.compaction]
window_size = 4096
stride = 512
block_size = 16
bptt_segments = 1
protected_prefix_tokens = -1

[trainer]
dist_timeout_seconds = 3600

[trainer.loss]
kl_tau = 0.0

[trainer.optim]
lr = 1e-6
weight_decay = 0.01
betas1 = 0.9
betas2 = 0.9
max_norm = 1.0

[orchestrator]
batch_size = 128
rollouts_per_example = 8
oversampling_factor = 1.0
use_token_client = false

# Padding needed so vLLM-side eviction lands on clean turn boundaries.
[orchestrator.compaction_padding]
enabled = true
block_size = 16
log_evicted_text = false

# Markovian Thinker is required by validators for summary to be enabled,
# but with summary.mode="eviction" the client-side message list is NOT
# truncated by max_turns; it's the plain-truncation FALLBACK if summary
# generation fails. Aligned with summary.compaction_max_turns so the
# fallback uses the same threshold and preserved-turn count as the
# primary summary splice.
[orchestrator.markovian_thinker]
enabled = true
max_turns = 4
stride = 2
log_truncated_messages = false

[orchestrator.markovian_thinker.summary]
enabled = true
mode = "eviction"
compaction_max_turns = 4
max_len_summary = 512
temperature = 0.3
top_p = 0.95
on_error = "drop"
log_summaries = false

[orchestrator.client]
base_url = ["http://localhost:8000/v1"]

[orchestrator.train.sampling]
max_completion_tokens = 512
temperature = 1.0

[[orchestrator.train.env]]
id = "textworld-env"
args = { dataset_path = "/home/toolkit/kv-eviction/textworld_cooking_mix", max_episode_steps = 50, num_train_examples = 5000, num_eval_examples = 500, seed = 42, include_initial_obs_in_system = true }

[inference]
seed = 1
enable_prefix_caching = false
gpu_memory_utilization = 0.85

[inference.server]
host = "0.0.0.0"
port = 8000

[inference.model]
name = "Qwen/Qwen3-4B-Instruct-2507"
max_model_len = 32768
enforce_eager = true

[inference.parallel]
dp = 4
tp = 1

# Eviction mode: vLLM-side block compaction ON. compaction_max_turns here
# is the vLLM turn-boundary-aligned block eviction trigger; keep it
# aligned with (or looser than) the summary trigger so summaries fire
# first at the client and the post-summary shape is the one vLLM evicts
# against.
[inference.vllm_extra]
async_scheduling = false
compaction_window_size = 4096
compaction_stride = 512
block_size = 16
compaction_protected_prefix_tokens = -1
compaction_max_turns = 8
compaction_eviction_turn_stride = 2
compaction_assume_aligned_turn_boundaries = true
