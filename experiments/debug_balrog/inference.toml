# debug_balrog: inference-side vLLM config (GPU 0, DP=1, TP=1).
#
# MUST mirror rl.toml's [trainer.compaction] exactly:
#   window_size             -> vllm_extra.compaction_window_size
#   stride                  -> vllm_extra.compaction_stride
#   block_size              -> vllm_extra.block_size
#   protected_prefix_tokens -> vllm_extra.compaction_protected_prefix_tokens

seed = 0
enable_prefix_caching = false

[server]
host = "0.0.0.0"
port = 8000

[model]
name = "Qwen/Qwen3-4B-Instruct-2507"
max_model_len = 8192
enforce_eager = true

[parallel]
dp = 1
tp = 1

[vllm_extra]
compaction_window_size = 512
compaction_stride = 256
block_size = 16
compaction_protected_prefix_tokens = 256
async_scheduling = false
gpu_memory_utilization = 0.85
enable_auto_tool_choice = true
tool_call_parser = "hermes"
