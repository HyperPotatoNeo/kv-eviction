# textworld-markovian-summary: Markovian Summary (mode="markovian") on
# TextWorld cooking — EAI single-node, seed 2.
#
# Extends the Markovian Thinker baseline: instead of silently dropping old
# turns when compaction_max_turns is exceeded, synthesize a model-authored
# summary and splice {user:instruction, assistant:summary} into the
# conversation. The summary is a first-class trainable turn.
#
# Full-reset semantics: sys + [I, S] + tail. vLLM-side compaction OFF.
#
# See `plans/markovian_summary.md` for full design + rationale.

max_steps = 600
seq_len = 16384
output_dir = "/mnt/adea/data_rw/finetuning/emilianopp/experiments/rebuttal/markovian-summary-textworld-seed2"
clean_output_dir = false

[ckpt]
interval = 50
resume_step = -1

[deployment]
type = "single_node"
gpus_per_node = 8
num_train_gpus = 4
num_infer_gpus = 4

[model]
name = "Qwen/Qwen3-4B-Instruct-2507"

[wandb]
project = "textworld-eviction"
name = "markovian-summary-textworld-seed2-v2"
id = "markovian-summary-textworld-seed2-v2"
group = "markovian-summary-textworld"

[trainer.model]
name = "Qwen/Qwen3-4B-Instruct-2507"
impl = "auto"
attn = "flash_attention_2"
ac = { mode = "full" }

# No [trainer.compaction] — Markovian Thinker / Markovian Summary
# (mode=markovian) is incompatible with trainer-side compaction.

[trainer]
dist_timeout_seconds = 3600

[trainer.loss]
kl_tau = 0.0

[trainer.optim]
lr = 1e-6
weight_decay = 0.01
betas1 = 0.9
betas2 = 0.9
max_norm = 1.0

[orchestrator]
batch_size = 128
rollouts_per_example = 8
oversampling_factor = 1.0
use_token_client = false

[orchestrator.compaction_padding]
enabled = false

[orchestrator.markovian_thinker]
enabled = true
max_turns = 4
stride = 2
log_truncated_messages = false

[orchestrator.markovian_thinker.summary]
enabled = true
mode = "markovian"
compaction_max_turns = 4
max_len_summary = 512
temperature = 0.3
top_p = 0.95
on_error = "drop"
log_summaries = false

[orchestrator.client]
base_url = ["http://localhost:8000/v1"]

[orchestrator.train.sampling]
max_completion_tokens = 512
temperature = 1.0

[[orchestrator.train.env]]
id = "textworld-env"
args = { dataset_path = "/home/toolkit/kv-eviction/textworld_cooking_mix", max_episode_steps = 50, num_train_examples = 5000, num_eval_examples = 500, seed = 42, include_initial_obs_in_system = true }

[inference]
seed = 2
enable_prefix_caching = false
gpu_memory_utilization = 0.85

[inference.server]
host = "0.0.0.0"
port = 8000

[inference.model]
name = "Qwen/Qwen3-4B-Instruct-2507"
max_model_len = 16384
enforce_eager = true

[inference.parallel]
dp = 4
tp = 1

# Markovian mode: no vLLM-side compaction (client does all truncation).
[inference.vllm_extra]
async_scheduling = false
